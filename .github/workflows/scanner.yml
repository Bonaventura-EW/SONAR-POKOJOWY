name: SONAR POKOJOWY Scanner

on:
  schedule:
    # 3 scany dziennie: 9:00, 15:00, 21:00 CET/CEST
    # W zimie (CET = UTC+1): 8:00, 14:00, 20:00 UTC
    # W lecie (CEST = UTC+2): 7:00, 13:00, 19:00 UTC
    - cron: '0 7,13,19 * * *'  # 9:00, 15:00, 21:00 CEST (letni)
    
  # Możliwość manualnego uruchomienia
  workflow_dispatch:

# Nigdy dwa scany naraz (cron + ręczny dispatch) — drugi run czeka w kolejce.
# Bez tego równoległy run przegrywa wyścig o git push i cały scan idzie do kosza.
concurrency:
  group: sonar-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Pozwala na push do repo
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run SONAR POKOJOWY scanner
        continue-on-error: true
        id: scanner
        run: |
          cd src
          python main.py || echo "::warning::Scanner failed but continuing..."
      
      - name: Generate map data
        if: success() || steps.scanner.outcome == 'failure'
        continue-on-error: true
        run: |
          cd src
          python map_generator.py || echo "::warning::Map generator failed but continuing..."
      
      - name: Track favorites
        if: always()
        continue-on-error: true
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
          cd src
          python favorites_tracker.py || echo "::warning::Favorites tracker failed but continuing..."

      - name: Generate mobile API
        if: always()
        continue-on-error: true
        run: |
          cd src
          python api_generator.py || echo "::warning::API generator failed but continuing..."
      
      - name: Generate top5 data
        if: always()
        continue-on-error: true
        run: |
          cd src
          python top5_generator.py || echo "::warning::Top5 generator failed but continuing..."

      - name: Generate trend index
        if: always()
        continue-on-error: true
        run: |
          cd src
          python trend_generator.py || echo "::warning::Trend generator failed but continuing..."

      - name: Commit and push changes
        if: always()
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/ docs/data.json docs/monitoring_data.json docs/skipped_debug.html docs/api/ docs/top5_data.json docs/profile_data.json docs/trend_data.json docs/favorites_data.json || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Automatyczny scan: $(TZ='Europe/Warsaw' date +'%Y-%m-%d %H:%M')" || true
            # Ktoś mógł wpushować w trakcie scanu — rebase przed pushem,
            # z retry żeby nie stracić wyników scanu na chwilowym błędzie.
            # -X theirs: przy konflikcie na plikach danych (offers.json itd.)
            # wygrywa świeży scan. rebase --abort przed każdą próbą sprząta
            # stan po nieudanym rebase — bez tego kolejne git pull pada na
            # "Pulling is not possible because you have unmerged files".
            pushed=false
            for i in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase -X theirs origin main && git push; then
                pushed=true
                break
              fi
              echo "::warning::Push attempt $i failed, retrying in $((i*5))s..."
              sleep $((i*5))
            done
            if [ "$pushed" != "true" ]; then
              echo "::error::Push failed after 3 attempts - scan results lost"
              exit 1
            fi
          fi
