<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONAR POKOJOWY – Firmy / Agencje</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            background: #0f172a;
            border-bottom: 1px solid #f59e0b;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .topbar-title { color: #f59e0b; font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .nav { display: flex; gap: 6px; }
        .nav a { color: #94a3b8; font-size: 11px; background: rgba(255,255,255,0.08); padding: 4px 10px; border-radius: 5px; text-decoration: none; }
        .nav a:hover { background: rgba(255,255,255,0.15); color: #e2e8f0; }
        .nav a.active { background: rgba(245,158,11,0.2); color: #f59e0b; }

        /* ── TABS ── */
        .tabs {
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 14px;
            display: flex;
            gap: 2px;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .tab {
            padding: 6px 14px;
            font-size: 12px;
            color: #64748b;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        .tab.active { color: #d97706; border-bottom-color: #d97706; }
        .tab-badge {
            background: #e2e8f0;
            border-radius: 10px;
            padding: 1px 6px;
            font-size: 10px;
            margin-left: 4px;
            color: #64748b;
        }
        .tab.active .tab-badge { background: rgba(245,158,11,0.15); color: #d97706; }
        /* Badge "NOWE" — świeża zmiana w profilu (≤2 dni), pulsuje */
        .tab-new {
            font-size: 9px;
            font-weight: 700;
            color: #fff;
            background: #dc2626;
            padding: 1px 5px;
            border-radius: 4px;
            letter-spacing: .3px;
            margin-left: 5px;
            animation: tabNewPulse 1.1s ease-in-out infinite;
        }
        @keyframes tabNewPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        /* ── STATSBAR ── */
        .statsbar {
            background: #f8fafc;
            padding: 5px 14px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e2e8f0;
            align-items: center;
            flex-shrink: 0;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            padding: 3px 10px;
        }
        .stat .v { font-size: 13px; font-weight: 600; color: #1d4ed8; }
        .stat .v.dim { color: #64748b; }
        .stat .l { font-size: 10px; color: #3b82f6; text-transform: uppercase; }
        .proflink { margin-left: auto; font-size: 10px; color: #3b82f6; text-decoration: none; }
        .proflink:hover { text-decoration: underline; }

        /* ── MAIN LAYOUT ── */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ── MAPA (sticky lewa) ── */
        .map-col {
            position: sticky;
            top: 0;
            height: 100%;
            overflow: hidden;
            border-right: 1px solid #e2e8f0;
        }
        #map { width: 100%; height: 100%; }

        /* ── LISTA (prawa, scrolluje) ── */
        .list-col { overflow-y: auto; }
        .list-col::-webkit-scrollbar { width: 4px; }
        .list-col::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        .list-hdr {
            padding: 7px 12px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .list-hdr strong { font-size: 12px; color: #1e293b; }
        .list-hdr span { font-size: 11px; color: #64748b; }

        /* ── WIERSZE OFERT ── */
        .row {
            padding: 9px 12px;
            border-bottom: 0.5px solid #e8ecf0;
            border-left: 2px solid transparent;
            cursor: pointer;
            transition: background 0.1s;
        }
        .row:hover { background: #f1f5f9; }
        .row.hl { background: rgba(245,158,11,0.06); border-left-color: #f59e0b; }
        .row.dim { opacity: 0.5; }

        .row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; gap: 8px; }
        .row-addr { font-size: 12px; font-weight: 600; color: #0f172a; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .row-price { font-size: 13px; font-weight: 700; white-space: nowrap; }

        .row-meta { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; margin-bottom: 0; }
        .badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
        .badge-pokoj { background: rgba(74,222,128,0.15); color: #166534; }
        .badge-mieszkanie { background: rgba(96,165,250,0.15); color: #1e40af; }
        .badge-new { background: #dc2626; color: white; }
        .badge-inactive { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .badge-reakt { background: rgba(245,158,11,0.1); color: #92400e; border: 1px solid rgba(245,158,11,0.3); }
        .meta-txt { font-size: 10px; color: #475569; }
        .meta-days { font-size: 10px; font-weight: 600; }
        .meta-days.fresh { color: #334155; }
        .meta-days.medium { color: #d97706; }
        .meta-days.old { color: #ef4444; }
        .olx-link { font-size: 10px; color: #3b82f6; text-decoration: none; margin-left: auto; }
        .olx-link:hover { text-decoration: underline; }
        .map-pin-btn { font-size: 10px; color: #ef4444; text-decoration: none; padding: 1px 5px; border: 1px solid #fca5a5; border-radius: 4px; background: #fff5f5; white-space: nowrap; }
        .map-pin-btn:hover { background: #fee2e2; border-color: #ef4444; }

        /* Historia cen */
        .history-row { display: flex; align-items: center; gap: 8px; padding-top: 5px; border-top: 0.5px solid #e8ecf0; margin-top: 5px; }
        .history-label { font-size: 10px; color: #94a3b8; flex-shrink: 0; width: 72px; }
        .history-list { font-size: 10px; color: #475569; line-height: 1.5; }
        .history-list .hp { font-weight: 600; min-width: 38px; display: inline-block; }
        .history-list .hd { color: #94a3b8; }
        .hp.down { color: #16a34a; }
        .hp.up { color: #dc2626; }
        .hp.same { color: #64748b; }

        /* Odświeżenia */
        .refresh-row { display: flex; align-items: center; gap: 8px; padding-top: 5px; border-top: 0.5px solid #e8ecf0; margin-top: 5px; }
        .refresh-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; }
        .refresh-bar { width: 7px; border-radius: 2px; flex-shrink: 0; }
        .refresh-bar.hit { background: #f59e0b; height: 16px; }
        .refresh-bar.miss { background: #e2e8f0; height: 4px; border: 1px solid #e2e8f0; }
        .refresh-info { font-size: 10px; line-height: 1.4; }
        .refresh-info .rc { color: #d97706; font-weight: 600; }
        .refresh-info .rl { color: #94a3b8; }

        /* ── WERSJE ADRESU (zmiana adresu tego samego listingu OLX) ── */
        .badge-addr { background: rgba(168,85,247,0.12); color: #7c3aed; border: 1px solid rgba(168,85,247,0.3); }
        .addr-new { color: #0f172a; font-weight: 700; }
        .addr-old { text-decoration: line-through; color: #94a3b8; font-weight: 500; }
        .addr-sub { font-size: 10px; color: #94a3b8; margin-top: 3px; font-weight: 400; }
        .addr-sub .ico { color: #a855f7; }
        .pr-old { text-decoration: line-through; color: #cbd5e1; }
        .pr-new { color: #dc2626; font-weight: 700; }
        .versions { border-top: 1px solid #eef2f6; margin-top: 7px; padding-top: 8px; }
        .versions-h { font-size: 10px; font-weight: 700; color: #475569; letter-spacing: .3px; margin-bottom: 7px; }
        .ver { position: relative; padding: 8px 10px 8px 20px; border-radius: 7px; margin-bottom: 5px; border: 1px solid #e7ecf2; background: #fff; }
        .ver.current { border-color: #c7f0d6; background: #f6fef9; }
        .ver::before { content: ''; position: absolute; left: 7px; top: 12px; width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; }
        .ver.current::before { background: #16a34a; }
        .ver-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
        .ver-addr { font-size: 11px; font-weight: 700; color: #0f172a; }
        .ver-addr.old { color: #64748b; }
        .ver-status { font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
        .st-active { background: rgba(22,163,74,.12); color: #15803d; }
        .st-ended { background: #f1f5f9; color: #94a3b8; }
        .ver-range { font-size: 10px; color: #94a3b8; margin-top: 1px; }
        .ver-body { display: flex; align-items: center; gap: 14px; margin-top: 6px; flex-wrap: wrap; }
        .ver-body .spark-wrap { display: flex; align-items: center; gap: 7px; }
        .ver-body .spark-label { font-size: 9px; color: #94a3b8; text-transform: uppercase; }
        .ver-body .spark-prices { font-size: 10px; color: #475569; }
        .ver-counters { display: flex; gap: 12px; font-size: 10px; }
        .vc { color: #475569; } .vc b { color: #d97706; } .vc.reakt b { color: #92400e; }
        .change { display: flex; align-items: center; gap: 6px; margin: 2px 0 5px 20px; font-size: 10px; color: #7c3aed; flex-wrap: wrap; }
        .change b { color: #0f172a; }
        .change .ico { color: #a855f7; }

        /* Belka archiwalna */
        .archive-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 12px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 35px;
            z-index: 9;
        }
        .archive-divider .line { flex: 1; height: 1px; background: #e2e8f0; }
        .archive-divider span { font-size: 11px; color: #94a3b8; font-weight: 600; white-space: nowrap; }

        /* Loading / error */
        #loading { text-align: center; padding: 80px 20px; color: #64748b; font-size: 1.1rem; }
        #error-msg { text-align: center; padding: 40px; color: #ef4444; display: none; }
        #main-content { display: none; flex: 1; flex-direction: column; min-height: 0; }

        /* Empty state */
        .empty { padding: 40px; text-align: center; color: #94a3b8; }

        /* Leaflet popup override */
        .leaflet-popup-content-wrapper { background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
        .leaflet-popup-tip { background: white; }
    
/* === Ujednolicony nagłówek (Warm Sunset C) === */

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── PRICE COLOR ──────────────────────────────────────────────────────
const PRICE_RANGES = [
    {max:500,c:'#00c853'},{max:600,c:'#64dd17'},{max:700,c:'#aeea00'},
    {max:800,c:'#ffd600'},{max:900,c:'#ffab00'},{max:1000,c:'#ff6f00'},
    {max:1100,c:'#ff3d00'},{max:1200,c:'#d50000'},{max:1300,c:'#c51162'},
    {max:1400,c:'#aa00ff'},{max:1500,c:'#7c4dff'},{max:1e9,c:'#6200ea'}
];
function pc(p) { return (PRICE_RANGES.find(r => p <= r.max) || PRICE_RANGES.at(-1)).c; }

// ── STATE ────────────────────────────────────────────────────────────
let profileData = null;
let map = null;
let leafletMarkers = {}; // offerId → {marker, color, active}
let hlId = null;
let currentKey = null;

// ── MAP INIT ─────────────────────────────────────────────────────────
function initMap() {
    map = L.map('map', { zoomControl: true }).setView([51.246, 22.565], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OSM', maxZoom: 19
    }).addTo(map);
}

function makeLeafletIcon(color, active, highlighted) {
    const stroke = highlighted ? '#f59e0b' : '#d97706';
    const sw = highlighted ? 4 : 2.5;
    const glow = highlighted ? 'filter:drop-shadow(0 0 5px #f59e0b)' : '';
    const inner = !active
        ? '<circle cx="12" cy="11" r="6" fill="white"/><text x="12" y="11" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="#334155">×</text>'
        : highlighted
        ? '<circle cx="12" cy="11" r="5" fill="white"/><text x="12" y="11" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="800" fill="' + color + '">★</text>'
        : '<circle cx="12" cy="11" r="5" fill="white" opacity="0.9"/>';
    return L.divIcon({
        className: '',
        html: '<svg width="24" height="32" viewBox="0 0 24 32" style="' + glow + '">'
            + '<path d="M12 0C5 0 0 5 0 12C0 21 12 32 12 32C12 32 24 21 24 12C24 5 19 0 12 0Z"'
            + ' fill="' + color + '" stroke="' + stroke + '" stroke-width="' + sw + '"'
            + (active ? '' : ' opacity="0.35"') + '/>'
            + inner + '</svg>',
        iconSize: [24, 32], iconAnchor: [12, 32], popupAnchor: [0, -34]
    });
}

// Ikona archiwalnego adresu (po zmianie adresu) — fioletowy pin, przerywany obrys, strzałka ↩
function makeArchivalIcon() {
    return L.divIcon({
        className: '',
        html: '<svg width="22" height="30" viewBox="0 0 24 32" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))">'
            + '<path d="M12 0C5 0 0 5 0 12C0 21 12 32 12 32C12 32 24 21 24 12C24 5 19 0 12 0Z"'
            + ' fill="#a855f7" fill-opacity="0.25" stroke="#7c3aed" stroke-width="2" stroke-dasharray="3 2"/>'
            + '<circle cx="12" cy="11" r="6" fill="white"/>'
            + '<text x="12" y="11.5" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#7c3aed">↩</text>'
            + '</svg>',
        iconSize: [22, 30], iconAnchor: [11, 30], popupAnchor: [0, -30]
    });
}

let archivalMarkers = [];
function renderMarkers(profileKey) {
    Object.values(leafletMarkers).forEach(m => map.removeLayer(m.marker));
    leafletMarkers = {};
    archivalMarkers.forEach(m => map.removeLayer(m));
    archivalMarkers = [];

    const prof = profileData.profiles[profileKey];
    if (!prof) return;

    const bounds = [];
    const allOffers = [...prof.offers];

    allOffers.forEach(o => {
        const inLublin = !o.city || o.city.toLowerCase() === 'lublin';
        if (!o.lat || !o.lon || !inLublin) return;

        const color = pc(o.price);
        const marker = L.marker([o.lat, o.lon], { icon: makeLeafletIcon(color, o.active, false) });

        const typeLabel = o.offer_type === 'mieszkanie' ? '🏠 mieszkanie' : o.offer_type === 'pokoj' ? '🛏 pokój' : '';
        const histHtml = (o.price_history || []).slice(-4).map(h =>
            '<div style="font-size:11px;color:#64748b">' + h.date + ': <b style="color:' + pc(h.price) + '">' + h.price + ' zł</b></div>'
        ).join('');

        marker.bindPopup(
            '<div style="min-width:180px;font-family:sans-serif">'
            + (typeLabel ? '<div style="font-size:10px;color:#d97706;margin-bottom:3px">' + typeLabel + '</div>' : '')
            + '<div style="font-weight:700;font-size:13px;margin-bottom:5px">' + (o.address || '—') + '</div>'
            + '<div style="font-size:14px;font-weight:800;color:' + color + ';margin-bottom:4px">' + o.price + ' zł</div>'
            + (o.refresh_count > 0 ? '<div style="font-size:10px;color:#d97706">🔄 odświeżeń: ' + o.refresh_count + '</div>' : '')
            + (histHtml ? '<div style="margin-top:5px;padding-top:5px;border-top:1px solid #e2e8f0"><b style="font-size:10px;color:#94a3b8">HISTORIA</b>' + histHtml + '</div>' : '')
            + '<div style="margin-top:6px"><a href="' + o.url + '" target="_blank" style="color:#3b82f6;font-size:11px">Otwórz na OLX ↗</a></div>'
            + '</div>',
            { maxWidth: 260 }
        );

        marker.on('click', () => hlOffer(o.id || o.url));
        marker.addTo(map);
        leafletMarkers[o.id || o.url] = { marker, color, active: o.active };
        bounds.push([o.lat, o.lon]);

        // Archiwalne pinezki POPRZEDNICH adresów (oferta zmieniła adres)
        // address_versions[0] = bieżąca (już wyrenderowana wyżej); [1..] = poprzednie
        (o.address_versions || []).slice(1).forEach(v => {
            if (!v.lat || !v.lon) return;
            const vColor = pc((v.price_history?.at(-1) || {}).price || 0);
            const am = L.marker([v.lat, v.lon], { icon: makeArchivalIcon(), zIndexOffset: -100 });
            am.bindPopup(
                '<div style="min-width:170px;font-family:sans-serif">'
                + '<div style="font-size:10px;color:#7c3aed;font-weight:700;margin-bottom:3px">↩ POPRZEDNI ADRES</div>'
                + '<div style="font-weight:700;font-size:13px;margin-bottom:2px">' + (v.address || '—') + '</div>'
                + '<div style="font-size:10px;color:#94a3b8;margin-bottom:4px">' + (v.first_seen || '') + ' → ' + (v.last_seen || '') + '</div>'
                + '<div style="font-size:13px;font-weight:800;color:' + vColor + '">' + ((v.price_history?.at(-1) || {}).price || '—') + ' zł</div>'
                + '<div style="font-size:10px;color:#64748b;margin-top:4px">oferta przeniesiona do: <b>' + (o.address || '—') + '</b></div>'
                + '</div>',
                { maxWidth: 240 }
            );
            am.on('click', () => hlOffer(o.id || o.url));
            am.addTo(map);
            archivalMarkers.push(am);
            bounds.push([v.lat, v.lon]);
        });
    });

    // Zawsze wyśrodkuj na Lublinie
    if (bounds.length > 0) {
        try { map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 }); } catch(e) {}
    }
    map.setView([51.246, 22.565], 13);
}

// ── HIGHLIGHT ────────────────────────────────────────────────────────
function hlOffer(id) {
    // Reset poprzedniego
    if (hlId && leafletMarkers[hlId]) {
        const old = leafletMarkers[hlId];
        old.marker.setIcon(makeLeafletIcon(old.color, old.active, false));
        old.marker.setZIndexOffset(0);
    }
    document.querySelectorAll('.row.hl').forEach(r => r.classList.remove('hl'));

    if (hlId === id) { hlId = null; return; }
    hlId = id;

    if (leafletMarkers[id]) {
        const m = leafletMarkers[id];
        m.marker.setIcon(makeLeafletIcon(m.color, m.active, true));
        m.marker.setZIndexOffset(1000);
        m.marker.openPopup();
        map.panTo(m.marker.getLatLng(), { animate: true });
    }

    const row = document.querySelector('.row[data-id="' + id + '"]');
    if (row) {
        row.classList.add('hl');
        row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// ── SPARKLINE ────────────────────────────────────────────────────────
function buildSparkline(history) {
    if (!history || history.length < 2) return '';
    const prices = history.map(h => h.price);
    const mn = Math.min(...prices), mx = Math.max(...prices);
    const range = mx - mn || 1;
    const W = 70, H = 26, PAD = 3;
    const step = (W - PAD*2) / (history.length - 1);
    const pts = history.map((h, i) => ({
        x: PAD + i * step,
        y: PAD + (1 - (h.price - mn) / range) * (H - PAD * 2),
        p: h.price, d: h.date
    }));
    const last = prices.at(-1), first = prices[0];
    const trend = last < first ? '#16a34a' : last > first ? '#dc2626' : '#94a3b8';
    const area = [...pts.map(p => p.x+','+p.y), pts.at(-1).x+','+H, pts[0].x+','+H].join(' ');
    const line = pts.map(p => p.x+','+p.y).join(' ');

    let histList = history.map((h, i) => {
        const cls = i === 0 ? 'same' : h.price < history[i-1].price ? 'down' : h.price > history[i-1].price ? 'up' : 'same';
        return '<div><span class="hp ' + cls + '">' + h.price + ' zł</span> <span class="hd">' + h.date + '</span></div>';
    }).join('');

    const arrow = last < first ? '↓' : last > first ? '↑' : '—';
    const diff = Math.abs(last - first);

    return '<div class="history-row">'
        + '<span class="history-label">Historia cen:</span>'
        + '<svg width="' + W + '" height="' + H + '" style="overflow:visible;flex-shrink:0">'
        + '<polyline points="' + area + '" fill="' + trend + '" fill-opacity="0.1" stroke="none"/>'
        + '<polyline points="' + line + '" fill="none" stroke="' + trend + '" stroke-width="1.5" stroke-linejoin="round"/>'
        + pts.map(p => '<circle cx="' + p.x + '" cy="' + p.y + '" r="2.2" fill="white" stroke="' + trend + '" stroke-width="1.2"><title>' + p.p + ' zł — ' + p.d + '</title></circle>').join('')
        + '</svg>'
        + '<div style="font-size:10px;line-height:1.4;color:' + trend + ';font-weight:600">' + arrow + ' ' + diff + ' zł</div>'
        + '<div class="history-list">' + histList + '</div>'
        + '</div>';
}

// ── REFRESH BARS ─────────────────────────────────────────────────────
function buildRefreshBars(refreshDates, refreshCount, lastRefreshDate) {
    if (!refreshCount || refreshCount === 0) return '';

    // Ostatnie 14 dni
    const today = new Date();
    const days = [];
    for (let i = 13; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        days.push(d.toISOString().slice(0, 10));
    }

    const datesSet = new Set(refreshDates || []);
    const bars = days.map(d => {
        const hit = datesSet.has(d);
        return '<div class="refresh-bar ' + (hit ? 'hit' : 'miss') + '" title="' + d + '"></div>';
    }).join('');

    const lastShort = lastRefreshDate ? lastRefreshDate.slice(5).replace('-', '.') : '';

    return '<div class="refresh-row">'
        + '<span class="history-label">Odświeżenia:</span>'
        + '<div class="refresh-bars">' + bars + '</div>'
        + '<div class="refresh-info"><div class="rc">×' + refreshCount + ' razy</div>'
        + (lastShort ? '<div class="rl">ostatnie: ' + lastShort + '</div>' : '')
        + '</div></div>';
}

// ── WERSJE ADRESU ─────────────────────────────────────────────────────
// Mały sparkline (sam SVG) dla pojedynczej wersji
function verSpark(history) {
    const prices = (history || []).map(h => h.price);
    if (prices.length < 2) {
        return '<svg width="70" height="26"><circle cx="35" cy="13" r="2.4" fill="#64748b"/></svg>';
    }
    const W = 70, H = 26, P = 3;
    const mn = Math.min(...prices), mx = Math.max(...prices), rg = (mx - mn) || 1;
    const step = (W - P * 2) / (prices.length - 1);
    const pts = prices.map((p, i) => [P + i * step, P + (1 - (p - mn) / rg) * (H - P * 2)]);
    const last = prices.at(-1), first = prices[0];
    const col = last < first ? '#16a34a' : last > first ? '#dc2626' : '#94a3b8';
    const line = pts.map(p => p.join(',')).join(' ');
    const area = [...pts.map(p => p.join(',')), pts.at(-1)[0] + ',' + H, pts[0][0] + ',' + H].join(' ');
    return '<svg width="' + W + '" height="' + H + '" style="overflow:visible;flex-shrink:0">'
        + '<polyline points="' + area + '" fill="' + col + '" fill-opacity=".1"/>'
        + '<polyline points="' + line + '" fill="none" stroke="' + col + '" stroke-width="1.5" stroke-linejoin="round"/>'
        + pts.map(p => '<circle cx="' + p[0] + '" cy="' + p[1] + '" r="2.1" fill="#fff" stroke="' + col + '" stroke-width="1.2"/>').join('')
        + '</svg>';
}

function verCard(v) {
    const status = v.active
        ? '<span class="ver-status st-active">AKTYWNA</span>'
        : '<span class="ver-status st-ended">' + (v.current ? 'NIEAKTYWNA' : 'ZAKOŃCZONA') + '</span>';
    const range = v.current ? ('od ' + (v.first_seen || '—'))
                            : ((v.first_seen || '—') + ' → ' + (v.last_seen || '—'));
    const prices = (v.price_history || []).map(h => h.price);
    const priceList = prices.length
        ? prices.map((p, i) => {
            const cls = i === 0 ? 'same' : p < prices[i - 1] ? 'down' : p > prices[i - 1] ? 'up' : 'same';
            return '<span class="hp ' + cls + '">' + p + (i === prices.length - 1 ? ' zł' : '') + '</span>';
          }).join(' ')
        : '—';
    return '<div class="ver' + (v.current ? ' current' : '') + '">'
        + '<div class="ver-top"><span class="ver-addr' + (v.current ? '' : ' old') + '">' + (v.address || '—') + '</span>' + status + '</div>'
        + '<div class="ver-range">' + range + '</div>'
        + '<div class="ver-body">'
        +   '<div class="spark-wrap"><span class="spark-label">Ceny</span>' + verSpark(v.price_history) + '<span class="spark-prices">' + priceList + '</span></div>'
        +   '<div class="ver-counters"><span class="vc">🔄 odświeżenia: <b>' + (v.refresh_count || 0) + '</b></span><span class="vc reakt">♻ reaktywacje: <b>' + (v.reactivation_count || 0) + '</b></span></div>'
        + '</div></div>';
}

function buildVersions(o) {
    const vers = o.address_versions || [];
    if (vers.length < 2) return '';
    let html = '<div class="versions"><div class="versions-h">📜 Historia ogłoszenia — ' + vers.length + ' wersje adresu</div>';
    vers.forEach((v, i) => {
        html += verCard(v);
        if (i < vers.length - 1) {
            const older = vers[i + 1];
            const oldP = (older.price_history.at(-1) || {}).price;
            const newP = (v.price_history[0] || {}).price;
            html += '<div class="change"><span class="ico">✏</span> zmiana adresu <b>' + (v.first_seen || '—') + '</b>'
                + (oldP != null && newP != null ? ' · cena <span class="pr-old">' + oldP + '</span> → <span class="pr-new">' + newP + ' zł</span>' : '')
                + '</div>';
        }
    });
    return html + '</div>';
}

// ── BUILD ROW HTML ────────────────────────────────────────────────────
function buildRow(o) {
    const id = o.id || o.url;
    const color = pc(o.price);
    const prices = (o.price_history || []).map(h => h.price);
    const last = prices.at(-1), first = prices[0];
    const trend = prices.length > 1 ? (last < first ? '↓' : last > first ? '↑' : '') : '';
    const trendColor = trend === '↓' ? '#16a34a' : trend === '↑' ? '#dc2626' : '';
    const hasHistory = o.price_history && o.price_history.length > 1;

    const daysClass = o.days_active > 60 ? 'old' : o.days_active > 20 ? 'medium' : 'fresh';

    const typeBadge = o.offer_type === 'mieszkanie'
        ? '<span class="badge badge-mieszkanie">🏠 mieszkanie</span>'
        : o.offer_type === 'pokoj'
        ? '<span class="badge badge-pokoj">🛏 pokój</span>'
        : '';

    const newBadge = o.is_new ? '<span class="badge badge-new">NOWE</span>' : '';

    const reaktBadge = (o.reactivation_count > 0)
        ? '<span class="badge badge-reakt">♻ reaktywacja ×' + o.reactivation_count + '</span>'
        : '';

    const inactiveBadge = !o.active ? '<span class="badge badge-inactive">NIEAKTYWNE</span>' : '';

    const trendHtml = trend
        ? '<span style="font-size:10px;margin-left:2px;color:' + trendColor + '">' + trend + '</span>'
        : '';

    // Czy oferta ma zmiany adresu (ten sam listing OLX, inne miejsce)
    const hasVersions = (o.address_change_count || 0) > 0 && (o.address_versions || []).length > 1;

    // Nagłówek adresu — styl C: nowy duży + linia "było ... → zmiana ..." pod spodem
    let addrHtml;
    if (hasVersions) {
        const prev = o.address_versions[1];           // ostatni poprzedni adres
        const cur = o.address_versions[0];
        const oldP = (prev.price_history.at(-1) || {}).price;
        const newP = (cur.price_history[0] || {}).price;
        addrHtml = '<span class="row-addr">'
            + '<span class="addr-new">' + (o.address || '—') + '</span>'
            + '<div class="addr-sub"><span class="ico">✏</span> było: <span class="addr-old">' + (prev.address || '—') + '</span>'
            + ' → zmiana ' + (o.address_changed_at || cur.first_seen || '')
            + (oldP != null && newP != null ? ' · <span class="pr-old">' + oldP + '</span> → <span class="pr-new">' + newP + ' zł</span>' : '')
            + '</div></span>';
    } else {
        addrHtml = '<span class="row-addr" title="' + (o.address || '—') + '">' + (o.address || '—') + '</span>';
    }

    const addrBadge = hasVersions
        ? '<span class="badge badge-addr">✏ ' + o.address_change_count + (o.address_change_count === 1 ? ' zmiana adresu' : ' zmiany adresu') + '</span>'
        : '';

    return '<div class="row' + (!o.active ? ' dim' : '') + '" data-id="' + id + '" onclick="hlOffer(\'' + id + '\')">'
        + '<div class="row-top">'
        + addrHtml
        + '<span class="row-price" style="color:' + color + '">' + o.price + ' zł' + trendHtml + '</span>'
        + '</div>'
        + '<div class="row-meta">'
        + typeBadge + newBadge + reaktBadge + addrBadge + inactiveBadge
        + '<span class="meta-txt">📅 ' + (o.first_seen || '—') + (!o.active && o.last_seen ? ' → ' + o.last_seen : '') + '</span>'
        + '<span class="meta-days ' + daysClass + '">⏳ ' + (o.days_active || 0) + ' dni</span>'
        + '<a class="olx-link" href="' + o.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">OLX ↗</a>'
        + (o.lat && o.lon ? '<a class="map-pin-btn" href="index.html?loc=' + o.lat + ',' + o.lon + '" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Pokaż na głównej mapie">📍 Mapa</a>' : '')
        + '</div>'
        // Gdy są wersje — sekcja wersji zastępuje pojedynczy wykres/odświeżenia (każda wersja ma własne)
        + (hasVersions
            ? buildVersions(o)
            : (hasHistory ? buildSparkline(o.price_history) : '') + buildRefreshBars(o.refresh_dates, o.refresh_count, o.last_refresh_date))
        + '</div>';
}

// ── RENDER PROFILE ────────────────────────────────────────────────────
function renderProfile(key) {
    currentKey = key;
    hlId = null;

    const prof = profileData.profiles[key];
    if (!prof) return;

    const LUBLIN_LAT = [51.14, 51.32];
    const LUBLIN_LON = [22.40, 22.72];
    const isLublin = o => {
        // 1. city jawnie ustawione
        if (o.city) return o.city.toLowerCase() === 'lublin';
        // 2. city puste - sprawdź współrzędne jeśli dostępne
        if (o.lat && o.lon) {
            return o.lat >= LUBLIN_LAT[0] && o.lat <= LUBLIN_LAT[1]
                && o.lon >= LUBLIN_LON[0] && o.lon <= LUBLIN_LON[1];
        }
        // 3. brak danych - sprawdź adres
        const addr = (o.address || '').toLowerCase();
        if (addr.includes('warszawa') || addr.includes('gdańsk') || addr.includes('gdansk')
            || addr.includes('kraków') || addr.includes('wrocław') || addr.includes('poznań')
            || addr.includes('szczecin') || addr.includes('bydgoszcz') || addr.includes('łódź')) {
            return false;
        }
        return true; // brak danych → zakładamy Lublin
    };
    const active = prof.offers.filter(o => o.active && isLublin(o));
    const archived = prof.offers.filter(o => !o.active && isLublin(o));
    const prices = active.map(o => o.price).filter(Boolean);
    const avg = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : null;

    // Statsbar
    const stats = [
        [active.length, 'aktywne', false],
        [archived.length, 'archiwalne', true],
        [prof.offers.length, 'łącznie', false],
        ...(avg ? [[avg + ' zł', 'śr. cena', false]] : []),
        ...(prices.length ? [[Math.min(...prices) + ' zł', 'min', false], [Math.max(...prices) + ' zł', 'max', false]] : []),
    ];

    document.getElementById('statsbar').innerHTML =
        stats.map(([v,l,dim]) =>
            '<div class="stat"><span class="v' + (dim?' dim':'') + '">' + v + '</span><span class="l">' + l + '</span></div>'
        ).join('')
        + '<a class="proflink" href="' + prof.url + '" target="_blank" rel="noopener">' + prof.url.replace('https://','').replace(/\/$/,'') + ' ↗</a>';

    // List header
    document.getElementById('list-count').textContent =
        active.length + ' aktywnych · ' + archived.length + ' archiwalnych';

    // List body
    let html = '';
    if (!prof.offers.length) {
        html = '<div class="empty">📭 Brak ogłoszeń z tego profilu</div>';
    } else {
        active.forEach(o => { html += buildRow(o); });

        if (archived.length > 0) {
            html += '<div class="archive-divider">'
                + '<div class="line"></div>'
                + '<span>╳ ogłoszenia archiwalne (' + archived.length + ') ╳</span>'
                + '<div class="line"></div>'
                + '</div>';
            archived.forEach(o => { html += buildRow(o); });
            html += '<div style="padding:10px;text-align:center;font-size:10px;color:#cbd5e1">koniec archiwalnych</div>';
        }
    }
    document.getElementById('list-body').innerHTML = html;

    // Markers
    renderMarkers(key);
}

// ── TABS ──────────────────────────────────────────────────────────────
function buildTabs() {
    const keys = profileData.profile_keys;
    document.getElementById('tabs-bar').innerHTML = keys.map(key => {
        const p = profileData.profiles[key];
        if (!p) return '';
        const cnt = p.stats.active;
        const on = key === currentKey;
        const newBadge = (p.stats && p.stats.recent_change) ? '<span class="tab-new">NOWE</span>' : '';
        return '<div class="tab' + (on?' active':'') + '" onclick="switchTab(\'' + key + '\')">'
            + p.name
            + '<span class="tab-badge">' + cnt + '</span>'
            + newBadge
            + '</div>';
    }).join('');
}

function switchTab(key) {
    currentKey = key;
    buildTabs();
    renderProfile(key);
}

// ── LOAD ──────────────────────────────────────────────────────────────
async function loadData() {
    try {
        const res = await fetch('profile_data.json?v=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        profileData = await res.json();

        document.getElementById('loading').style.display = 'none';
        const mc = document.getElementById('main-content');
        mc.style.display = 'flex';

        initMap();

        currentKey = profileData.profile_keys[0];
        buildTabs();
        renderProfile(currentKey);
        // Krótkie opóźnienie - mapa musi się wyrenderować zanim switchTab wywoła invalidateSize
        setTimeout(applyHashTab, 150);

    } catch (e) {
        document.getElementById('loading').style.display = 'none';
        const err = document.getElementById('error-msg');
        err.style.display = 'block';
        err.innerHTML = '❌ Błąd ładowania profile_data.json: ' + e.message
            + '<br><small>Plik zostanie wygenerowany przy kolejnym skanie lub uruchomieniu map_generator.py</small>';
    }
}

loadData();

// Obsługa hash URL — np. profile_tracker.html#poqui
// Przeglądarka może przetworzyć hash przed załadowaniem danych,
// więc sprawdzamy go po załadowaniu w render().
function applyHashTab() {
    const hash = window.location.hash.slice(1); // usuń #
    if (!hash) return;
    // Spróbuj jako klucz bezpośrednio, potem jako lowercase
    const key = profileData.profiles[hash] ? hash
               : profileData.profiles[hash.toLowerCase()] ? hash.toLowerCase()
               : null;
    if (key) {
        switchTab(key);
    }
}
